<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>RSVPs · 4th of July</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shrikhand&family=Permanent+Marker&family=Special+Elite&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{ --red:#D8362F; --navy:#2B5BA8; --navy-deep:#1f3d77; --gold:#E8B23A; --cream:#FBF4E2; --ink:#34302b; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Fredoka',sans-serif;
    background:radial-gradient(120% 80% at 50% 0%, #16306b 0%, #0d1d44 45%, #081229 100%);
    min-height:100vh; color:var(--ink); padding:28px 16px 60px;
  }
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-family:'Shrikhand',serif;color:var(--cream);font-size:clamp(28px,6vw,40px);text-align:center;text-shadow:0 2px 8px rgba(0,0,0,.5);}
  .sub{font-family:'Permanent Marker',cursive;color:var(--gold);text-align:center;font-size:18px;margin:4px 0 24px;}

  .card{background:var(--cream);border-radius:14px;padding:22px;box-shadow:0 16px 40px rgba(0,0,0,.45);}

  /* gate */
  #gate label{display:block;font-family:'Special Elite',monospace;color:var(--navy);font-size:.9rem;margin-bottom:8px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  input[type=password]{flex:1;min-width:180px;padding:12px;border:2px solid var(--navy);border-radius:6px;font-family:'Fredoka';font-size:1rem;}
  button{cursor:pointer;border:none;border-radius:6px;padding:12px 20px;font-family:'Permanent Marker',cursive;font-size:1rem;letter-spacing:.02em;}
  .btn-go{background:var(--red);color:#fff;}
  .btn-ghost{background:#e7e0d0;color:#555;}
  .err{color:var(--red);font-family:'Special Elite',monospace;font-size:.85rem;margin-top:12px;min-height:1em;}

  /* stats */
  .stats{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{flex:1;min-width:140px;background:var(--navy);color:var(--cream);border-radius:12px;padding:16px;text-align:center;}
  .stat .num{font-family:'Shrikhand',serif;font-size:34px;line-height:1;}
  .stat .lbl{font-family:'Special Elite',monospace;font-size:.72rem;letter-spacing:.12em;margin-top:6px;opacity:.9;text-transform:uppercase;}

  table{width:100%;border-collapse:collapse;font-size:.95rem;}
  th{font-family:'Special Elite',monospace;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;color:var(--navy);text-align:left;padding:8px 10px;border-bottom:2px solid var(--navy);}
  td{padding:10px;border-bottom:1px solid #e3d9bf;}
  tr:last-child td{border-bottom:none;}
  td.party{text-align:center;font-weight:600;}
  .name{font-weight:600;color:var(--navy-deep);}
  .when{color:#6b5f48;font-size:.82rem;white-space:nowrap;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
  .hide{display:none;}
  .empty{text-align:center;color:#6b5f48;font-style:italic;padding:24px;}
  @media(max-width:480px){ .when{font-size:.74rem;} td,th{padding:8px 6px;} }
</style>
</head>
<body>
<div class="wrap">
  <h1>★ RSVP List ★</h1>
  <div class="sub">4th of July Party</div>

  <!-- password gate -->
  <div class="card" id="gate">
    <form id="gate-form">
      <label for="pw">Enter the host password to view RSVPs</label>
      <div class="row">
        <input type="password" id="pw" autocomplete="current-password" placeholder="password">
        <button type="submit" class="btn-go">Unlock</button>
      </div>
      <div class="err" id="err"></div>
    </form>
  </div>

  <!-- results -->
  <div class="card hide" id="results">
    <div class="stats">
      <div class="stat"><div class="num" id="stat-responses">0</div><div class="lbl">Responses</div></div>
      <div class="stat" style="background:var(--red);"><div class="num" id="stat-heads">0</div><div class="lbl">Total guests</div></div>
    </div>
    <div class="toolbar">
      <div style="font-family:'Special Elite',monospace;font-size:.8rem;color:var(--navy);" id="updated"></div>
      <div class="row">
        <button class="btn-go" id="refresh" style="font-size:.85rem;padding:8px 14px;">Refresh</button>
        <button class="btn-ghost" id="lock" style="font-size:.85rem;padding:8px 14px;">Lock</button>
      </div>
    </div>
    <div id="table-wrap"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://xcdqkuzpbvbtpyhroibv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_9fZfKKpWlQuLPunmj96RMg_k2iwL6UZ';
let currentPass = null;

const $ = id => document.getElementById(id);

function fmtWhen(iso){
  try{
    const d = new Date(iso);
    return d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
  }catch(e){ return iso; }
}

function partyLabel(n){
  n = parseInt(n,10) || 1;
  return n <= 1 ? '1' : '+' + (n-1) + ' (' + n + ')';
}

async function loadRsvps(pass){
  const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/get_rsvps', {
    method:'POST',
    headers:{ 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY, 'Content-Type':'application/json' },
    body: JSON.stringify({ pass: pass })
  });
  if(res.status === 401 || res.status === 403) throw new Error('bad-password');
  if(!res.ok) throw new Error('http-' + res.status);
  return res.json();
}

function render(rows){
  rows = rows || [];
  const heads = rows.reduce((s,r)=> s + (parseInt(r.party_size,10)||1), 0);
  $('stat-responses').textContent = rows.length;
  $('stat-heads').textContent = heads;
  $('updated').textContent = 'Updated ' + new Date().toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'});

  if(!rows.length){
    $('table-wrap').innerHTML = '<div class="empty">No RSVPs yet — check back soon! 🎆</div>';
    return;
  }
  let html = '<table><thead><tr><th>Name</th><th style="text-align:center;">Party</th><th>Favorite monument</th><th>RSVP’d</th></tr></thead><tbody>';
  for(const r of rows){
    const name = (r.name||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    const mon = (r.monument||'').replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]));
    html += '<tr><td class="name">'+name+'</td><td class="party">'+partyLabel(r.party_size)+'</td><td>'+mon+'</td><td class="when">'+fmtWhen(r.created_at)+'</td></tr>';
  }
  html += '</tbody></table>';
  $('table-wrap').innerHTML = html;
}

function showResults(){ $('gate').classList.add('hide'); $('results').classList.remove('hide'); }
function showGate(){ $('results').classList.add('hide'); $('gate').classList.remove('hide'); }

$('gate-form').addEventListener('submit', async function(e){
  e.preventDefault();
  $('err').textContent = '';
  const pass = $('pw').value;
  if(!pass) return;
  const btn = this.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = '…';
  try{
    const rows = await loadRsvps(pass);
    currentPass = pass;
    try{ sessionStorage.setItem('rsvp_pass', pass); }catch(e){}
    render(rows);
    showResults();
  }catch(err){
    $('err').textContent = (err.message === 'bad-password') ? 'Wrong password — try again.' : 'Something went wrong. Try again.';
  }finally{
    btn.disabled = false; btn.textContent = 'Unlock';
  }
});

$('refresh').addEventListener('click', async function(){
  if(!currentPass) return;
  this.disabled = true; const t=this.textContent; this.textContent='…';
  try{ render(await loadRsvps(currentPass)); }catch(e){}
  this.disabled = false; this.textContent = t;
});

$('lock').addEventListener('click', function(){
  currentPass = null;
  try{ sessionStorage.removeItem('rsvp_pass'); }catch(e){}
  $('pw').value = '';
  showGate();
});

// auto-unlock within the same browser session
(function(){
  let saved = null;
  try{ saved = sessionStorage.getItem('rsvp_pass'); }catch(e){}
  if(saved){
    loadRsvps(saved).then(rows => { currentPass = saved; render(rows); showResults(); }).catch(()=>{});
  }
})();
</script>
</body>
</html>
